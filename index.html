<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Моё мини-приложение</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding-top: 50px; }
    input { padding: 8px; font-size: 16px; margin-bottom: 10px; width: 200px; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
    #output { margin-top: 20px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Привет из мини-приложения! 👋</h1>

  <p>Как тебя зовут?</p>
  <input type="text" id="nameInput" placeholder="Введи имя">
  <br>
  <button onclick="showGreeting()">Показать приветствие</button>
  <button onclick="sendToBot()">Отправить боту</button>

  <div id="output"></div>

  <script>
    function showGreeting() {
      const name = document.getElementById("nameInput").value;
      const output = document.getElementById("output");
      output.innerText = "Приятно познакомиться, " + name + "! 🎉";
    }

    function sendToBot() {
      const name = document.getElementById("nameInput").value;
      const data = { name: name };
      Telegram.WebApp.sendData(JSON.stringify(data));
    }
  </script>
</body>
</html>
